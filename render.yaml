services:
  - type: web
    name: peopleops-workflow-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /api/schema/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SECURE_SSL_REDIRECT
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: peopleops-db
          property: connectionString
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: ALLOWED_HOSTS
        value: peopleops-workflow-api.onrender.com

databases:
  - name: peopleops-db
    databaseName: peopleops
    user: peopleops
    plan: free
